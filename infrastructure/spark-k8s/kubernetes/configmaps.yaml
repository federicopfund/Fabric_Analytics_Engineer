# ═══════════════════════════════════════════════════════════════
# ConfigMap — Configuración de Spark y del pipeline
# ═══════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-config
  namespace: spark-medallion
  labels:
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: medallion-pipeline
data:
  # ── Spark Core ──
  SPARK_MASTER: "k8s://https://kubernetes.default.svc:443"
  SPARK_APP_NAME: "BatchETL-Medallion-v6-K8s"
  SPARK_MAIN_CLASS: "medallion.Pipeline"
  SPARK_DRIVER_MEMORY: "2g"
  SPARK_EXECUTOR_MEMORY: "4g"
  SPARK_EXECUTOR_CORES: "2"
  SPARK_NUM_EXECUTORS: "3"
  SPARK_DYNAMIC_ALLOCATION: "true"
  SPARK_SHUFFLE_PARTITIONS: "200"

  # ── COS Buckets ──
  COS_BUCKET_RAW: "datalake-raw-us-south-dev"
  COS_BUCKET_BRONZE: "datalake-bronze-us-south-dev"
  COS_BUCKET_SILVER: "datalake-silver-us-south-dev"
  COS_BUCKET_GOLD: "datalake-gold-us-south-dev"

  # ── JAR Location ──
  JAR_COS_KEY: "spark-jars/root-assembly-2.0.0.jar"
  JAR_LOCAL_PATH: "/opt/spark/work/root-assembly-2.0.0.jar"

  # ── Pipeline ──
  PIPELINE_MODE: "K8S"
  PIPELINE_LOG_LEVEL: "INFO"
  PIPELINE_RETRY_MAX: "3"
  PIPELINE_RETRY_DELAY_MS: "5000"

  # ── Delta Lake ──
  DELTA_EXTENSIONS: "io.delta.sql.DeltaSparkSessionExtension"
  DELTA_CATALOG: "org.apache.spark.sql.delta.catalog.DeltaCatalog"

  # ── spark-defaults.conf (montado en driver/executor) ──
  spark-defaults.conf: |
    spark.master                                    k8s://https://kubernetes.default.svc:443
    spark.kubernetes.namespace                       spark-medallion
    spark.kubernetes.authenticate.driver.serviceAccountName  spark-driver
    spark.kubernetes.container.image                 us.icr.io/medallion/spark-medallion:latest
    spark.kubernetes.container.image.pullPolicy       IfNotPresent

    # ── Resources ──
    spark.driver.memory                              2g
    spark.driver.cores                               1
    spark.executor.memory                            4g
    spark.executor.cores                             2
    spark.executor.instances                         3
    spark.dynamicAllocation.enabled                  true
    spark.dynamicAllocation.minExecutors             1
    spark.dynamicAllocation.maxExecutors             6
    spark.dynamicAllocation.executorIdleTimeout      60s
    spark.dynamicAllocation.shuffleTracking.enabled   true

    # ── S3A / COS ──
    spark.hadoop.fs.s3a.impl                         org.apache.hadoop.fs.s3a.S3AFileSystem
    spark.hadoop.fs.s3a.path.style.access            true
    spark.hadoop.fs.s3a.connection.ssl.enabled        true
    spark.hadoop.fs.s3a.fast.upload                  true
    spark.hadoop.fs.s3a.fast.upload.buffer           bytebuffer
    spark.hadoop.fs.s3a.multipart.size               67108864
    spark.hadoop.fs.s3a.connection.maximum            200

    # ── Delta Lake ──
    spark.sql.extensions                              io.delta.sql.DeltaSparkSessionExtension
    spark.sql.catalog.spark_catalog                   org.apache.spark.sql.delta.catalog.DeltaCatalog
    spark.databricks.delta.retentionDurationCheck.enabled  false

    # ── Performance ──
    spark.sql.shuffle.partitions                     200
    spark.sql.adaptive.enabled                       true
    spark.sql.adaptive.coalescePartitions.enabled     true
    spark.serializer                                  org.apache.spark.serializer.KryoSerializer
    spark.kryoserializer.buffer.max                  256m
    spark.network.timeout                             600s
    spark.rpc.askTimeout                              600s

    # ── Fault Tolerance ──
    spark.task.maxFailures                            4
    spark.stage.maxConsecutiveAttempts                 4
    spark.kubernetes.executor.deleteOnTermination      true

    # ── UI / History Server ──
    spark.eventLog.enabled                            true
    spark.eventLog.dir                                s3a://datalake-gold-us-south-dev/spark-events/
    spark.ui.prometheus.enabled                        true
---
# ═══════════════════════════════════════════════════════════════
# ConfigMap — Scripts de pre-flight y health check
# ═══════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-scripts
  namespace: spark-medallion
  labels:
    app.kubernetes.io/component: scripts
    app.kubernetes.io/part-of: medallion-pipeline
data:
  # ── Pre-flight: descarga JAR de COS y valida conectividad ──
  preflight.sh: |
    #!/bin/bash
    set -eo pipefail

    echo "╔══════════════════════════════════════════════╗"
    echo "║   Pre-flight Checks — Medallion Pipeline     ║"
    echo "╚══════════════════════════════════════════════╝"

    # ── Step 1: Obtener IAM token desde API key (si existe) o usar HMAC ──
    echo "[1/4] Downloading JAR from COS..."
    BUCKET="${COS_BUCKET_RAW:-datalake-raw-us-south-dev}"
    COS_KEY="${JAR_COS_KEY:-spark-jars/root-assembly-2.0.0.jar}"
    DEST="${JAR_LOCAL_PATH:-/opt/spark/work/root-assembly-2.0.0.jar}"
    ENDPOINT="${COS_ENDPOINT:-s3.us-south.cloud-object-storage.appdomain.cloud}"

    DOWNLOAD_OK=false

    # Método 1: Obtener IAM token y descargar con Bearer (preferred — uses private endpoint)
    if [ "${DOWNLOAD_OK}" = "false" ] && [ -n "${IBMCLOUD_API_KEY:-}" ]; then
      echo "  → Getting IAM token via private endpoint..."
      IAM_TOKEN=$(curl -sS --max-time 30 -X POST "https://private.iam.cloud.ibm.com/identity/token" \
        -H "Content-Type: application/x-www-form-urlencoded" \
        -d "apikey=${IBMCLOUD_API_KEY}&grant_type=urn:ibm:params:oauth:grant-type:apikey" \
        2>/dev/null | python3 -c "import sys,json;print(json.load(sys.stdin)['access_token'])" 2>/dev/null || echo "")

      if [ -n "${IAM_TOKEN}" ]; then
        echo "  → Downloading JAR with IAM Bearer token..."
        HTTP_CODE=$(curl -sS --max-time 300 -w "%{http_code}" -o "${DEST}" \
          -H "Authorization: Bearer ${IAM_TOKEN}" \
          "https://${ENDPOINT}/${BUCKET}/${COS_KEY}" 2>/dev/null || echo "000")

        if [ "${HTTP_CODE}" = "200" ] && [ -s "${DEST}" ]; then
          DOWNLOAD_OK=true
        else
          echo "  ⚠ IAM download returned HTTP ${HTTP_CODE}"
        fi
      else
        echo "  ⚠ Failed to obtain IAM token"
      fi
    fi

    # Método 2: Fallback — S3 HMAC credentials (AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY)
    if [ "${DOWNLOAD_OK}" = "false" ] && [ -n "${AWS_ACCESS_KEY_ID:-}" ] && [ -n "${AWS_SECRET_ACCESS_KEY:-}" ]; then
      echo "  → Fallback: Using HMAC credentials for COS download..."
      RESOURCE="/${BUCKET}/${COS_KEY}"
      DATE_VALUE=$(date -u +"%a, %d %b %Y %H:%M:%S GMT")
      CONTENT_TYPE="application/octet-stream"
      STRING_TO_SIGN="GET\n\n${CONTENT_TYPE}\n${DATE_VALUE}\n${RESOURCE}"
      SIGNATURE=$(echo -en "${STRING_TO_SIGN}" | openssl dgst -sha1 -hmac "${AWS_SECRET_ACCESS_KEY}" -binary | base64)

      HTTP_CODE=$(curl -sS --max-time 300 -w "%{http_code}" -o "${DEST}" \
        -H "Date: ${DATE_VALUE}" \
        -H "Content-Type: ${CONTENT_TYPE}" \
        -H "Authorization: AWS ${AWS_ACCESS_KEY_ID}:${SIGNATURE}" \
        "https://${ENDPOINT}/${BUCKET}/${COS_KEY}" 2>/dev/null || echo "000")

      if [ "${HTTP_CODE}" = "200" ] && [ -s "${DEST}" ]; then
        DOWNLOAD_OK=true
      else
        echo "  ⚠ HMAC download returned HTTP ${HTTP_CODE}"
      fi
    fi

    if [ "${DOWNLOAD_OK}" = "false" ]; then
      echo "ERROR: Failed to download JAR from COS"
      echo "  ENDPOINT: ${ENDPOINT}"
      echo "  BUCKET: ${BUCKET}"
      echo "  KEY: ${COS_KEY}"
      exit 1
    fi

    JAR_SIZE=$(du -h "${DEST}" 2>/dev/null | awk '{print $1}')
    echo "  ✓ JAR downloaded (${JAR_SIZE})"

    # ── Step 2: Validar JAR ──
    echo "[2/4] Validating JAR..."
    if command -v jar &>/dev/null; then
      jar tf "${DEST}" 2>/dev/null | grep -q "medallion/Pipeline" || {
        echo "ERROR: JAR does not contain medallion.Pipeline"
        exit 1
      }
      echo "  ✓ Main class found: medallion.Pipeline"
    else
      # Verificar ZIP magic bytes (PK\x03\x04) usando od (más portable que xxd)
      file_header=$(od -A n -t x1 -N 4 "${DEST}" 2>/dev/null | tr -d ' ')
      if echo "${file_header}" | grep -qi "^504b0304"; then
        echo "  ✓ JAR is valid ZIP archive (jar command not available)"
      elif [ "$(stat -c%s "${DEST}" 2>/dev/null || echo 0)" -gt 10000000 ]; then
        echo "  ⚠ Cannot verify JAR format (no xxd/jar), but file is $(du -h "${DEST}" | awk '{print $1}') — proceeding"
      else
        echo "ERROR: Downloaded file is not a valid JAR (header: ${file_header})"
        exit 1
      fi
    fi

    # ── Step 3: Test COS connectivity (HEAD on bucket) ──
    echo "[3/4] Testing COS connectivity..."
    if [ -n "${IAM_TOKEN:-}" ]; then
      curl -sS --max-time 10 -o /dev/null -w "" \
        -H "Authorization: Bearer ${IAM_TOKEN}" \
        "https://${ENDPOINT}/${BUCKET}?max-keys=1" > /dev/null 2>&1 \
        && echo "  ✓ COS RAW bucket accessible" \
        || echo "  ⚠ COS list check failed (will use Spark S3A config)"
    else
      echo "  ⚠ COS list check skipped (no IAM token available)"
    fi

    # ── Step 4: Test Db2 connectivity (optional) ──
    echo "[4/4] Testing Db2 connectivity..."
    timeout 5 bash -c "echo > /dev/tcp/${DB2_HOSTNAME:-localhost}/${DB2_PORT:-30376}" 2>/dev/null && \
      echo "  ✓ Db2 reachable at ${DB2_HOSTNAME}:${DB2_PORT}" || \
      echo "  ⚠ Db2 not reachable (export may be skipped)"

    echo ""
    echo "✔ Pre-flight complete. Starting Spark..."

  # ── Health check endpoint ──
  healthcheck.sh: |
    #!/bin/bash
    # Liveness: verifica que el proceso Spark driver esté corriendo
    pgrep -f "spark.driver" > /dev/null 2>&1 || \
    pgrep -f "medallion.Pipeline" > /dev/null 2>&1

  # ── Post-run: cleanup y notificación ──
  postrun.sh: |
    #!/bin/bash
    set -euo pipefail

    EXIT_CODE=${1:-0}
    TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

    echo "╔══════════════════════════════════════════════╗"
    echo "║   Post-run — Medallion Pipeline              ║"
    echo "╚══════════════════════════════════════════════╝"
    echo "Exit code: ${EXIT_CODE}"
    echo "Timestamp: ${TIMESTAMP}"

    # Cleanup tmp files
    rm -rf /tmp/spark-* /tmp/hsperfdata_* 2>/dev/null || true

    if [ "${EXIT_CODE}" -ne 0 ]; then
      echo "::error::Pipeline failed with exit code ${EXIT_CODE}"
    else
      echo "✔ Pipeline completed successfully"
    fi

    exit ${EXIT_CODE}
