# ═══════════════════════════════════════════════════════════════
# Secrets — Credenciales COS, Db2, IBM Cloud
#
# IMPORTANTE: Este archivo es un TEMPLATE. En producción, usar:
#   - IBM Secrets Manager con External Secrets Operator
#   - kubectl create secret ... (no versionado en git)
#   - Sealed Secrets (Bitnami)
#
# Aplicar con:
#   envsubst < secrets.yaml | kubectl apply -f -
# ═══════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: cos-credentials
  namespace: spark-medallion
  labels:
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: medallion-pipeline
type: Opaque
stringData:
  access-key: "${COS_ACCESS_KEY}"
  secret-key: "${COS_SECRET_KEY}"
  endpoint: "s3.us-south.cloud-object-storage.appdomain.cloud"
---
apiVersion: v1
kind: Secret
metadata:
  name: db2-credentials
  namespace: spark-medallion
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: medallion-pipeline
type: Opaque
stringData:
  hostname: "${DB2_HOSTNAME}"
  port: "${DB2_PORT}"
  database: "${DB2_DATABASE}"
  username: "${DB2_USERNAME}"
  password: "${DB2_PASSWORD}"
  jdbc-url: "jdbc:db2://${DB2_HOSTNAME}:${DB2_PORT}/${DB2_DATABASE}:sslConnection=true;"
---
apiVersion: v1
kind: Secret
metadata:
  name: ibmcloud-api
  namespace: spark-medallion
  labels:
    app.kubernetes.io/component: cloud
    app.kubernetes.io/part-of: medallion-pipeline
type: Opaque
stringData:
  api-key: "${IBMCLOUD_API_KEY}"
