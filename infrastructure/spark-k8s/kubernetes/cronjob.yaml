# ═══════════════════════════════════════════════════════════════
# CronJob — Spark Medallion Pipeline (Scheduled Execution)
#
# Ejecuta el pipeline ETL Medallion v6.0 como un CronJob de K8s.
# El driver pod descarga el fat JAR desde COS, ejecuta el pipeline
# y los executor pods se crean dinámicamente via Spark K8s backend.
#
# Schedule: Cada hora (configurable)
# Concurrency: Forbid (no overlap entre ejecuciones)
# Retries: 2 con backoff
# TTL: Limpia pods completados después de 1 hora
# ═══════════════════════════════════════════════════════════════
apiVersion: batch/v1
kind: CronJob
metadata:
  name: spark-medallion-etl
  namespace: spark-medallion
  labels:
    app.kubernetes.io/name: spark-medallion-etl
    app.kubernetes.io/component: scheduler
    app.kubernetes.io/part-of: medallion-pipeline
    app.kubernetes.io/version: "6.0"
  annotations:
    description: "Pipeline Medallion ETL — CronJob horario"
    prometheus.io/scrape: "true"
spec:
  # ── Schedule: cada hora en punto ──
  schedule: "0 * * * *"

  # ── Concurrency Policy ──
  # Forbid: no iniciar nueva ejecución si la anterior no terminó
  concurrencyPolicy: Forbid

  # ── Deadline: no iniciar si pasaron más de 5 min del schedule ──
  startingDeadlineSeconds: 300

  # ── History: mantener últimos 5 exitosos y 3 fallidos ──
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 3

  # ── Suspend: false (activo) ──
  suspend: false

  jobTemplate:
    metadata:
      labels:
        app.kubernetes.io/name: spark-medallion-etl
        app.kubernetes.io/component: driver
        app.kubernetes.io/part-of: medallion-pipeline
    spec:
      # ── TTL: limpiar job 1h después de completar ──
      ttlSecondsAfterFinished: 3600

      # ── Retries ──
      backoffLimit: 2

      # ── Timeout: máximo 45 min por ejecución ──
      activeDeadlineSeconds: 2700

      template:
        metadata:
          labels:
            app.kubernetes.io/name: spark-medallion-etl
            app.kubernetes.io/component: driver
            app.kubernetes.io/part-of: medallion-pipeline
            spark-role: driver
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "4040"
            prometheus.io/path: "/metrics/prometheus/"
        spec:
          serviceAccountName: spark-driver
          restartPolicy: Never

          # ── Tolerations para nodos dedicados (opcional) ──
          tolerations:
            - key: "spark-workload"
              operator: "Equal"
              value: "etl"
              effect: "NoSchedule"

          # ── Node Affinity: preferir nodos con label spark ──
          affinity:
            nodeAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 80
                  preference:
                    matchExpressions:
                      - key: workload-type
                        operator: In
                        values: ["spark", "compute"]
            # Anti-affinity: no colocar 2 drivers en el mismo nodo
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      spark-role: driver
                  topologyKey: "kubernetes.io/hostname"

          # ── Termination grace: 60s para que Spark haga cleanup ──
          terminationGracePeriodSeconds: 60

          # ═══════════════════════════════════════════
          # Init Container — Pre-flight checks + JAR download
          # ═══════════════════════════════════════════
          initContainers:
            - name: preflight
              image: us.icr.io/medallion/spark-medallion:latest
              command: ["/bin/bash", "/opt/spark/scripts/preflight.sh"]
              envFrom:
                - configMapRef:
                    name: spark-config
              env:
                - name: COS_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: cos-credentials
                      key: endpoint
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: cos-credentials
                      key: access-key
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: cos-credentials
                      key: secret-key
                - name: DB2_HOSTNAME
                  valueFrom:
                    secretKeyRef:
                      name: db2-credentials
                      key: hostname
                - name: DB2_PORT
                  valueFrom:
                    secretKeyRef:
                      name: db2-credentials
                      key: port
                - name: IBMCLOUD_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: ibmcloud-api
                      key: api-key
              volumeMounts:
                - name: spark-work
                  mountPath: /opt/spark/work
                - name: scripts
                  mountPath: /opt/spark/scripts
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"

          # ═══════════════════════════════════════════
          # Main Container — Spark Driver
          # ═══════════════════════════════════════════
          containers:
            - name: spark-driver
              image: us.icr.io/medallion/spark-medallion:latest
              imagePullPolicy: IfNotPresent

              command:
                - /opt/spark/bin/spark-submit
              args:
                - --master
                - k8s://https://kubernetes.default.svc:443
                - --deploy-mode
                - client
                - --name
                - BatchETL-Medallion-v6-K8s
                - --class
                - medallion.Pipeline
                - --conf
                - spark.kubernetes.namespace=spark-medallion
                - --conf
                - spark.kubernetes.authenticate.driver.serviceAccountName=spark-driver
                - --conf
                - spark.kubernetes.container.image=us.icr.io/medallion/spark-medallion:latest
                # ── Resources ──
                - --conf
                - spark.driver.memory=2g
                - --conf
                - spark.executor.memory=4g
                - --conf
                - spark.executor.cores=2
                - --conf
                - spark.executor.instances=3
                # ── Dynamic Allocation ──
                - --conf
                - spark.dynamicAllocation.enabled=true
                - --conf
                - spark.dynamicAllocation.minExecutors=1
                - --conf
                - spark.dynamicAllocation.maxExecutors=6
                - --conf
                - spark.dynamicAllocation.shuffleTracking.enabled=true
                # ── S3A / COS ──
                - --conf
                - spark.hadoop.fs.s3a.access.key=$(AWS_ACCESS_KEY_ID)
                - --conf
                - spark.hadoop.fs.s3a.secret.key=$(AWS_SECRET_ACCESS_KEY)
                - --conf
                - spark.hadoop.fs.s3a.endpoint=https://$(COS_ENDPOINT)
                - --conf
                - spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
                - --conf
                - spark.hadoop.fs.s3a.path.style.access=true
                - --conf
                - spark.hadoop.fs.s3a.connection.ssl.enabled=true
                - --conf
                - spark.hadoop.fs.s3a.fast.upload=true
                # ── Delta Lake ──
                - --conf
                - spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension
                - --conf
                - spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog
                # ── Performance ──
                - --conf
                - spark.serializer=org.apache.spark.serializer.KryoSerializer
                - --conf
                - spark.sql.adaptive.enabled=true
                - --conf
                - spark.sql.shuffle.partitions=200
                # ── Monitoring ──
                - --conf
                - spark.ui.prometheus.enabled=true
                - --conf
                - spark.eventLog.enabled=true
                - --conf
                - spark.eventLog.dir=s3a://datalake-gold-us-south-dev/spark-events/
                # ── JAR ──
                - /opt/spark/work/root-assembly-2.0.0.jar

              env:
                # COS Credentials
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: cos-credentials
                      key: access-key
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: cos-credentials
                      key: secret-key
                - name: COS_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: cos-credentials
                      key: endpoint
                # Db2 Credentials
                - name: DB2_HOSTNAME
                  valueFrom:
                    secretKeyRef:
                      name: db2-credentials
                      key: hostname
                - name: DB2_PORT
                  valueFrom:
                    secretKeyRef:
                      name: db2-credentials
                      key: port
                - name: DB2_DATABASE
                  valueFrom:
                    secretKeyRef:
                      name: db2-credentials
                      key: database
                - name: DB2_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: db2-credentials
                      key: username
                - name: DB2_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: db2-credentials
                      key: password
                - name: DB2_SSL
                  value: "true"
                # Pipeline mode
                - name: PIPELINE_MODE
                  value: "K8S"
                # JVM options
                - name: JAVA_TOOL_OPTIONS
                  value: >-
                    -XX:+UseG1GC
                    -XX:MaxGCPauseMillis=200
                    -XX:+UseStringDeduplication
                    --add-opens=java.base/java.lang=ALL-UNNAMED
                    --add-opens=java.base/java.lang.invoke=ALL-UNNAMED
                    --add-opens=java.base/java.lang.reflect=ALL-UNNAMED
                    --add-opens=java.base/java.io=ALL-UNNAMED
                    --add-opens=java.base/java.net=ALL-UNNAMED
                    --add-opens=java.base/java.nio=ALL-UNNAMED
                    --add-opens=java.base/java.util=ALL-UNNAMED
                    --add-opens=java.base/java.util.concurrent=ALL-UNNAMED
                    --add-opens=java.base/sun.nio.ch=ALL-UNNAMED
                    --add-opens=java.base/sun.security.action=ALL-UNNAMED

              ports:
                - name: spark-ui
                  containerPort: 4040
                  protocol: TCP
                - name: driver-rpc
                  containerPort: 7078
                  protocol: TCP
                - name: block-manager
                  containerPort: 7079
                  protocol: TCP

              # ── Health Checks ──
              startupProbe:
                exec:
                  command: ["/bin/bash", "/opt/spark/scripts/healthcheck.sh"]
                initialDelaySeconds: 30
                periodSeconds: 10
                failureThreshold: 6

              livenessProbe:
                exec:
                  command: ["/bin/bash", "/opt/spark/scripts/healthcheck.sh"]
                initialDelaySeconds: 60
                periodSeconds: 30
                failureThreshold: 3
                timeoutSeconds: 10

              # ── Resources ──
              resources:
                requests:
                  cpu: "1"
                  memory: "2Gi"
                limits:
                  cpu: "2"
                  memory: "4Gi"

              # ── Volume Mounts ──
              volumeMounts:
                - name: spark-work
                  mountPath: /opt/spark/work
                - name: spark-conf
                  mountPath: /opt/spark/conf/spark-defaults.conf
                  subPath: spark-defaults.conf
                - name: scripts
                  mountPath: /opt/spark/scripts
                - name: tmp
                  mountPath: /tmp

              # ── Security Context ──
              securityContext:
                runAsNonRoot: true
                runAsUser: 185
                runAsGroup: 185
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop: ["ALL"]

          # ═══════════════════════════════════════════
          # Volumes
          # ═══════════════════════════════════════════
          volumes:
            - name: spark-work
              emptyDir:
                sizeLimit: "2Gi"
            - name: spark-conf
              configMap:
                name: spark-config
                items:
                  - key: spark-defaults.conf
                    path: spark-defaults.conf
            - name: scripts
              configMap:
                name: spark-scripts
                defaultMode: 0755
            - name: tmp
              emptyDir:
                sizeLimit: "1Gi"

          # ── Image Pull Secrets (IBM Container Registry) ──
          imagePullSecrets:
            - name: icr-secret
