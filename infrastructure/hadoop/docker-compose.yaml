services:
  # ============================================================
  # HADOOP HDFS — NameNode
  # ============================================================
  namenode:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: namenode
    hostname: namenode
    environment:
      - CLUSTER_NAME=lakehouse
      - HDFS_CONF_dfs_namenode_name_dir=/hadoop/dfs/name
      - HDFS_CONF_dfs_replication=1
    ports:
      - "9870:9870"   # NameNode Web UI
      - "9000:9000"   # HDFS RPC
    volumes:
      - namenode_data:/hadoop/dfs/name
      - ./conf/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./conf/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
      - ../../transformation/spark-jobs/pipelines/batch-etl-scala/src/main/resources/csv:/mnt/csv-data
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD", "hdfs", "dfsadmin", "-safemode", "get"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================================
  # HADOOP HDFS — DataNode
  # ============================================================
  datanode:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: datanode
    hostname: datanode
    environment:
      - HDFS_CONF_dfs_datanode_data_dir=/hadoop/dfs/data
      - HDFS_CONF_dfs_datanode_hostname=localhost
    ports:
      - "9864:9864"   # DataNode Web UI
      - "9866:9866"   # DataNode data transfer
    volumes:
      - datanode_data:/hadoop/dfs/data
      - ./conf/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
      - ./conf/hdfs-site.xml:/opt/hadoop/etc/hadoop/hdfs-site.xml
    depends_on:
      namenode:
        condition: service_healthy
    networks:
      - lakehouse-net

  # ============================================================
  # HIVE — Metastore (MySQL-backed)
  # ============================================================
  hive-metastore-db:
    image: mysql:5.7
    container_name: hive-metastore-db
    hostname: hive-metastore-db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: metastore
      MYSQL_USER: hive
      MYSQL_PASSWORD: hive_password
    volumes:
      - hive_metastore_db:/var/lib/mysql
    networks:
      - lakehouse-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  hive-metastore:
    image: apache/hive:3.1.3
    container_name: hive-metastore
    hostname: hive-metastore
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: mysql
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=com.mysql.jdbc.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:mysql://hive-metastore-db:3306/metastore?createDatabaseIfNotExist=true&useSSL=false
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive_password
    ports:
      - "9083:9083"   # Thrift Metastore
    volumes:
      - ./conf/core-site.xml:/opt/hive/conf/core-site.xml
      - ./conf/hdfs-site.xml:/opt/hive/conf/hdfs-site.xml
      - ./conf/hive-site.xml:/opt/hive/conf/hive-site.xml
      - ./lib/mysql-connector-java-5.1.49.jar:/opt/hive/lib/mysql-connector-java-5.1.49.jar
      - ./hive-entrypoint.sh:/hive-entrypoint.sh
    entrypoint: ["/bin/bash", "/hive-entrypoint.sh"]
    depends_on:
      hive-metastore-db:
        condition: service_healthy
      namenode:
        condition: service_healthy
    networks:
      - lakehouse-net

volumes:
  namenode_data:
  datanode_data:
  hive_metastore_db:

networks:
  lakehouse-net:
    name: lakehouse-net
    driver: bridge
