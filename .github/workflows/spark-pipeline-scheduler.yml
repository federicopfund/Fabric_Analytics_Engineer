# ═══════════════════════════════════════════════════════════════
# GitHub Actions — Spark Pipeline Scheduler (IBM Analytics Engine)
#
# Ejecuta el pipeline Medallion v6.0 en IBM AE Serverless.
# Modos:
#   • Cron automático: Diario a las 06:00 UTC
#   • Manual: workflow_dispatch con parámetros opcionales
#
# Secrets requeridos:
#   IBMCLOUD_API_KEY, COS_ACCESS_KEY, COS_SECRET_KEY, DB2_PASSWORD
# ═══════════════════════════════════════════════════════════════
name: Spark Pipeline — Medallion v6.0

on:
  schedule:
    - cron: '0 6 * * *'   # Diario 06:00 UTC

  workflow_dispatch:
    inputs:
      skip_csv_upload:
        description: 'Saltar upload de CSVs (datos ya en COS)'
        required: false
        default: false
        type: boolean
      spark_version:
        description: 'Versión de Spark en AE'
        required: false
        default: '3.5'
        type: string

permissions:
  contents: read

concurrency:
  group: spark-pipeline-scheduler
  cancel-in-progress: false

env:
  AE_INSTANCE_ID: a688f3c4-efa9-4f12-842c-6a8d73a7ed2e
  AE_REGION: us-south
  AE_API_BASE: https://api.us-south.ae.cloud.ibm.com

  COS_ENDPOINT: s3.us-south.cloud-object-storage.appdomain.cloud
  COS_BUCKET_RAW: datalake-raw-us-south-dev

  JAR_COS_KEY: spark-jars/root-assembly-2.0.0.jar
  SPARK_CLASS: medallion.Pipeline
  SPARK_VERSION: '3.5'

  DB2_HOSTNAME: 6667d8e9-9d4d-4ccb-ba32-21da3bb5aafc.c1ogj3sd0tgtu0lqde00.databases.appdomain.cloud
  DB2_PORT: '30376'
  DB2_DATABASE: bludb
  DB2_USERNAME: qtn87286
  DB2_SSL: 'true'

jobs:
  # ════════════════════════════════════════════════════════════
  # Job 1: Upload CSV data to COS (idempotente, skip existing)
  # ════════════════════════════════════════════════════════════
  upload-data:
    name: Upload CSV → COS
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: ${{ inputs.skip_csv_upload != true }}
    steps:
      - uses: actions/checkout@v4

      - name: IBM Cloud login
        uses: ./.github/actions/ibmcloud-login
        with:
          api-key: ${{ secrets.IBMCLOUD_API_KEY }}
          region: ${{ env.AE_REGION }}

      - name: Upload CSV files to COS raw bucket (skip existing)
        run: |
          CSV_DIR="transformation/spark-jobs/pipelines/batch-etl-scala/datalake/raw"
          if [ ! -d "$CSV_DIR" ]; then
            echo "::warning::CSV directory not found: $CSV_DIR"
            exit 0
          fi

          EXISTING=$(ibmcloud cos list-objects \
            --bucket "${{ env.COS_BUCKET_RAW }}" \
            --region "${{ env.AE_REGION }}" \
            --output json 2>/dev/null \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for obj in data.get('Contents', []):
              print(obj['Key'])
          " 2>/dev/null || echo "")

          UPLOADED=0
          SKIPPED=0
          for csv in "$CSV_DIR"/*.csv; do
            filename=$(basename "$csv")
            if echo "$EXISTING" | grep -qx "$filename"; then
              echo "⏭ Already in bucket: $filename"
              SKIPPED=$((SKIPPED + 1))
            else
              echo "Uploading: $filename"
              ibmcloud cos put-object \
                --bucket "${{ env.COS_BUCKET_RAW }}" \
                --key "$filename" \
                --body "$csv" \
                --region "${{ env.AE_REGION }}"
              UPLOADED=$((UPLOADED + 1))
            fi
          done
          echo "✔ Done — uploaded: $UPLOADED, skipped (already exist): $SKIPPED"

  # ════════════════════════════════════════════════════════════
  # Job 2: Submit Spark Application to AE
  # ════════════════════════════════════════════════════════════
  submit-spark:
    name: Submit Spark App → AE
    runs-on: ubuntu-24.04
    needs: [upload-data]
    timeout-minutes: 10
    if: ${{ always() && (needs.upload-data.result == 'success' || needs.upload-data.result == 'skipped') }}
    outputs:
      app_id: ${{ steps.submit.outputs.app_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions

      - name: Get IAM token
        id: iam
        uses: ./.github/actions/iam-token
        with:
          api-key: ${{ secrets.IBMCLOUD_API_KEY }}

      - name: Submit Spark application
        id: submit
        env:
          IAM_TOKEN: ${{ steps.iam.outputs.token }}
          COS_ACCESS_KEY: ${{ secrets.COS_ACCESS_KEY }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          DB2_PASSWORD: ${{ secrets.DB2_PASSWORD }}
          SPARK_VERSION: ${{ inputs.spark_version || env.SPARK_VERSION }}
        run: |
          export APP_NAME="Medallion-v6-$(date +%Y%m%d-%H%M%S)"
          PAYLOAD=$(python3 <<'PYEOF'
          import json, os
          payload = {
              "application_details": {
                  "application": f"s3a://{os.environ['COS_BUCKET_RAW']}/{os.environ['JAR_COS_KEY']}",
                  "class": os.environ["SPARK_CLASS"],
                  "name": os.environ["APP_NAME"],
                  "conf": {
                      "spark.app.name": "BatchETL-Medallion-v6",
                      "spark.hadoop.fs.s3a.access.key": os.environ["COS_ACCESS_KEY"],
                      "spark.hadoop.fs.s3a.secret.key": os.environ["COS_SECRET_KEY"],
                      "spark.hadoop.fs.s3a.endpoint": f"https://{os.environ['COS_ENDPOINT']}",
                      "spark.hadoop.fs.s3a.impl": "org.apache.hadoop.fs.s3a.S3AFileSystem",
                      "spark.hadoop.fs.s3a.path.style.access": "true",
                      "spark.hadoop.fs.s3a.connection.ssl.enabled": "true",
                      "spark.sql.extensions": "io.delta.sql.DeltaSparkSessionExtension",
                      "spark.sql.catalog.spark_catalog": "org.apache.spark.sql.delta.catalog.DeltaCatalog",
                  },
                  "env": {
                      "EXECUTION_MODE": "IBM_AE",
                      "AE_INSTANCE_ID": os.environ["AE_INSTANCE_ID"],
                      "COS_ACCESS_KEY": os.environ["COS_ACCESS_KEY"],
                      "COS_SECRET_KEY": os.environ["COS_SECRET_KEY"],
                      "COS_ENDPOINT": os.environ["COS_ENDPOINT"],
                      "DB2_HOSTNAME": os.environ["DB2_HOSTNAME"],
                      "DB2_PORT": os.environ["DB2_PORT"],
                      "DB2_DATABASE": os.environ["DB2_DATABASE"],
                      "DB2_USERNAME": os.environ["DB2_USERNAME"],
                      "DB2_PASSWORD": os.environ["DB2_PASSWORD"],
                      "DB2_SSL": os.environ["DB2_SSL"],
                  },
                  "runtime": {"spark_version": os.environ["SPARK_VERSION"]},
              }
          }
          print(json.dumps(payload))
          PYEOF
          )

          RESPONSE=$(curl -sfS -X POST \
            "${AE_API_BASE}/v3/analytics_engines/${AE_INSTANCE_ID}/spark_applications" \
            -H "Authorization: Bearer ${IAM_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          APP_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || echo "")
          if [ -z "$APP_ID" ]; then
            echo "::error::Submit failed. Response: $RESPONSE"
            exit 1
          fi

          echo "app_id=$APP_ID" >> "$GITHUB_OUTPUT"
          {
            echo "### Spark App Submitted ✔"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| App ID | \`$APP_ID\` |"
            echo "| App Name | $APP_NAME |"
            echo "| Spark | $SPARK_VERSION |"
            echo "| Bucket | $COS_BUCKET_RAW |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ════════════════════════════════════════════════════════════
  # Job 3: Monitor & Wait for completion
  # ════════════════════════════════════════════════════════════
  monitor:
    name: Monitor Spark App
    runs-on: ubuntu-24.04
    needs: [submit-spark]
    timeout-minutes: 35
    if: ${{ needs.submit-spark.outputs.app_id != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions

      - name: Get IAM token
        id: iam
        uses: ./.github/actions/iam-token
        with:
          api-key: ${{ secrets.IBMCLOUD_API_KEY }}

      - name: Poll application status
        id: poll
        env:
          IAM_TOKEN: ${{ steps.iam.outputs.token }}
          APP_ID: ${{ needs.submit-spark.outputs.app_id }}
        run: |
          MAX_POLLS=60        # 60 × 30s = 30 min timeout
          POLL_INTERVAL=30
          echo "Monitoring app: $APP_ID"

          for i in $(seq 1 $MAX_POLLS); do
            RESPONSE=$(curl -sfS \
              "${AE_API_BASE}/v3/analytics_engines/${AE_INSTANCE_ID}/spark_applications/$APP_ID" \
              -H "Authorization: Bearer ${IAM_TOKEN}")

            STATE=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('state','unknown'))" 2>/dev/null)
            echo "[$i/$MAX_POLLS] State: $STATE"

            case "$STATE" in
              finished)
                echo "state=finished" >> "$GITHUB_OUTPUT"
                START=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('start_time',''))" 2>/dev/null)
                END=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('end_time',''))" 2>/dev/null)
                {
                  echo "### Pipeline Finished ✔"
                  echo "| Start | $START |"
                  echo "| End | $END |"
                } >> "$GITHUB_STEP_SUMMARY"
                exit 0
                ;;
              failed|stopped|error)
                echo "state=$STATE" >> "$GITHUB_OUTPUT"
                echo "::error::Application $STATE"
                {
                  echo "### Pipeline $STATE ✗"
                  echo '```json'
                  echo "$RESPONSE"
                  echo '```'
                } >> "$GITHUB_STEP_SUMMARY"
                exit 1
                ;;
              accepted|waiting|running)
                sleep $POLL_INTERVAL
                ;;
              *)
                echo "::warning::Unknown state: $STATE"
                sleep $POLL_INTERVAL
                ;;
            esac
          done

          echo "::error::Timeout after $((MAX_POLLS * POLL_INTERVAL))s"
          exit 1

      - name: Summary
        if: always()
        run: |
          echo "Final state: ${{ steps.poll.outputs.state }}"
          echo "Spark History UI:"
          echo "  https://spark-console.${{ env.AE_REGION }}.ae.cloud.ibm.com/v3/analytics_engines/${{ env.AE_INSTANCE_ID }}/spark_history_ui"
