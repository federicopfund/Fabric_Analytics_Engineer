# ═══════════════════════════════════════════════════════════════
# GitHub Actions — CI/CD Pipeline (Build + Test + Deploy)
#
# En cada push a main o PR:
#   1. Compila el JAR Scala (con cache de sbt/coursier)
#   2. Ejecuta tests unitarios
#   3. Sube JAR a COS (solo en push a main)
#   4. Deploy a AE (solo en push a main)
#
# Secrets: IBMCLOUD_API_KEY, COS_ACCESS_KEY, COS_SECRET_KEY, DB2_PASSWORD
# ═══════════════════════════════════════════════════════════════
name: CI/CD — Build, Test & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'transformation/spark-jobs/pipelines/batch-etl-scala/**'
      - '.github/workflows/ci-cd-pipeline.yml'
      - '.github/actions/**'

  pull_request:
    branches: [main]
    paths:
      - 'transformation/spark-jobs/pipelines/batch-etl-scala/**'

  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to AE after build'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  AE_INSTANCE_ID: a688f3c4-efa9-4f12-842c-6a8d73a7ed2e
  AE_REGION: us-south
  COS_ENDPOINT: s3.us-south.cloud-object-storage.appdomain.cloud
  COS_BUCKET_RAW: datalake-raw-us-south-dev
  JAR_COS_KEY: spark-jars/root-assembly-2.0.0.jar
  SCALA_DIR: transformation/spark-jobs/pipelines/batch-etl-scala
  JAR_NAME: root-assembly-2.0.0.jar
  DB2_HOSTNAME: 6667d8e9-9d4d-4ccb-ba32-21da3bb5aafc.c1ogj3sd0tgtu0lqde00.databases.appdomain.cloud
  DB2_PORT: '30376'
  DB2_DATABASE: bludb
  DB2_USERNAME: qtn87286
  DB2_SSL: 'true'

jobs:
  # ════════════════════════════════════════════════════════════
  # Job 1: Build & Test (cached, uploads JAR as artifact)
  # ════════════════════════════════════════════════════════════
  build:
    name: Build & Test
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Scala build
        uses: ./.github/actions/setup-scala-build
        with:
          working-directory: ${{ env.SCALA_DIR }}

      - name: Compile
        working-directory: ${{ env.SCALA_DIR }}
        run: sbt -batch compile

      - name: Run Tests
        id: test
        working-directory: ${{ env.SCALA_DIR }}
        run: |
          set -o pipefail
          sbt -batch test 2>&1 | tee test-output.log | tail -30

      - name: Summarize tests
        if: always()
        working-directory: ${{ env.SCALA_DIR }}
        run: |
          PASSED=$(grep -cE "\[info\].*passed" test-output.log 2>/dev/null || echo 0)
          FAILED=$(grep -cE "\[error\].*failed" test-output.log 2>/dev/null || echo 0)
          {
            echo "### Test Results"
            echo "| Metric | Count |"
            echo "|--------|-------|"
            echo "| Passed | $PASSED |"
            echo "| Failed | $FAILED |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build Fat JAR
        id: jar
        working-directory: ${{ env.SCALA_DIR }}
        run: |
          sbt -batch assembly
          JAR_PATH="target/scala-2.12/${{ env.JAR_NAME }}"
          if [ ! -f "$JAR_PATH" ]; then
            echo "::error::JAR not found: $JAR_PATH"
            exit 1
          fi
          JAR_SIZE=$(du -h "$JAR_PATH" | awk '{print $1}')
          JAR_SHA=$(sha256sum "$JAR_PATH" | awk '{print $1}')
          echo "jar_size=$JAR_SIZE" >> "$GITHUB_OUTPUT"
          echo "jar_sha=$JAR_SHA" >> "$GITHUB_OUTPUT"
          {
            echo "### Build Artifact"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| JAR | ${{ env.JAR_NAME }} |"
            echo "| Size | $JAR_SIZE |"
            echo "| SHA256 | \`${JAR_SHA:0:16}...\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: spark-jar
          path: ${{ env.SCALA_DIR }}/target/scala-2.12/${{ env.JAR_NAME }}
          retention-days: 7
          if-no-files-found: error

  # ════════════════════════════════════════════════════════════
  # Job 2: Upload JAR to COS (only main, depends on build)
  # ════════════════════════════════════════════════════════════
  publish:
    name: Publish JAR → COS
    runs-on: ubuntu-24.04
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    timeout-minutes: 10
    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: spark-jar
          path: ./jar

      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions

      - name: IBM Cloud login
        uses: ./.github/actions/ibmcloud-login
        with:
          api-key: ${{ secrets.IBMCLOUD_API_KEY }}
          region: ${{ env.AE_REGION }}
          configure-cos-crn: 'false'

      - name: Upload JAR
        run: |
          ibmcloud cos put-object \
            --bucket "${{ env.COS_BUCKET_RAW }}" \
            --key "${{ env.JAR_COS_KEY }}" \
            --body "./jar/${{ env.JAR_NAME }}" \
            --region "${{ env.AE_REGION }}"
          echo "✔ JAR uploaded to COS"

  # ════════════════════════════════════════════════════════════
  # Job 3: Deploy to AE
  # ════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to AE
    runs-on: ubuntu-24.04
    needs: [publish]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && inputs.deploy != false
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions

      - name: Get IAM token
        id: iam
        uses: ./.github/actions/iam-token
        with:
          api-key: ${{ secrets.IBMCLOUD_API_KEY }}

      - name: Submit Spark App
        env:
          COS_ACCESS_KEY: ${{ secrets.COS_ACCESS_KEY }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          DB2_PASSWORD: ${{ secrets.DB2_PASSWORD }}
          IAM_TOKEN: ${{ steps.iam.outputs.token }}
        run: |
          export APP_NAME="CI-Deploy-$(date +%Y%m%d-%H%M%S)"
          PAYLOAD=$(python3 <<'PYEOF'
          import json, os
          payload = {
              "application_details": {
                  "application": f"s3a://{os.environ['COS_BUCKET_RAW']}/{os.environ['JAR_COS_KEY']}",
                  "class": "medallion.Pipeline",
                  "name": os.environ["APP_NAME"],
                  "conf": {
                      "spark.app.name": "BatchETL-CI-Deploy",
                      "spark.hadoop.fs.s3a.access.key": os.environ["COS_ACCESS_KEY"],
                      "spark.hadoop.fs.s3a.secret.key": os.environ["COS_SECRET_KEY"],
                      "spark.hadoop.fs.s3a.endpoint": f"https://{os.environ['COS_ENDPOINT']}",
                      "spark.hadoop.fs.s3a.impl": "org.apache.hadoop.fs.s3a.S3AFileSystem",
                      "spark.hadoop.fs.s3a.path.style.access": "true",
                      "spark.hadoop.fs.s3a.connection.ssl.enabled": "true",
                      "spark.sql.extensions": "io.delta.sql.DeltaSparkSessionExtension",
                      "spark.sql.catalog.spark_catalog": "org.apache.spark.sql.delta.catalog.DeltaCatalog",
                  },
                  "env": {
                      "EXECUTION_MODE": "IBM_AE",
                      "AE_INSTANCE_ID": os.environ["AE_INSTANCE_ID"],
                      "COS_ACCESS_KEY": os.environ["COS_ACCESS_KEY"],
                      "COS_SECRET_KEY": os.environ["COS_SECRET_KEY"],
                      "COS_ENDPOINT": os.environ["COS_ENDPOINT"],
                      "DB2_HOSTNAME": os.environ["DB2_HOSTNAME"],
                      "DB2_PORT": os.environ["DB2_PORT"],
                      "DB2_DATABASE": os.environ["DB2_DATABASE"],
                      "DB2_USERNAME": os.environ["DB2_USERNAME"],
                      "DB2_PASSWORD": os.environ["DB2_PASSWORD"],
                      "DB2_SSL": os.environ["DB2_SSL"],
                  },
                  "runtime": {"spark_version": "3.5"},
              }
          }
          print(json.dumps(payload))
          PYEOF
          )
          RESPONSE=$(curl -sfS -X POST \
            "https://api.${AE_REGION}.ae.cloud.ibm.com/v3/analytics_engines/${AE_INSTANCE_ID}/spark_applications" \
            -H "Authorization: Bearer ${IAM_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          APP_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))" 2>/dev/null || echo "")
          if [ -z "$APP_ID" ]; then
            echo "::error::Deploy failed: $RESPONSE"
            exit 1
          fi
          {
            echo "### Deployed ✔"
            echo "App ID: \`$APP_ID\`"
            echo "App Name: $APP_NAME"
          } >> "$GITHUB_STEP_SUMMARY"
